kind = "web"
previewPath = "/"
title = "Car Wash Pro"
version = "1.0.0"
id = "artifacts/car-wash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22565

[services.development]
run = "pnpm --filter @workspace/car-wash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/car-wash", "run", "build" ]
publicDir = "artifacts/car-wash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22565"
BASE_PATH = "/"
